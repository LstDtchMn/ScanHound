<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="50%" style="stop-color:#1b2838"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <!-- Radar sweep gradient -->
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>
    <!-- Blip glow -->
    <radialGradient id="blipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#00e5ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="20" y="20" width="472" height="472" rx="92" ry="92"
        fill="none" stroke="#00e5ff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="160" fill="url(#centerGlow)"/>

  <!-- Concentric radar rings -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#00e5ff" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#00e5ff" stroke-opacity="0.15" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00e5ff" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#00e5ff" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#00e5ff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#00e5ff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Radar sweep (triangle/wedge from center) -->
  <path d="M 256 256 L 256 80 A 176 176 0 0 1 408 168 Z"
        fill="url(#sweep)" opacity="0.5"/>

  <!-- Sweep leading edge line -->
  <line x1="256" y1="256" x2="408" y2="168" stroke="#00e5ff" stroke-opacity="0.7" stroke-width="2"/>

  <!-- Sweep trailing fade -->
  <path d="M 256 256 L 408 168 A 176 176 0 0 1 432 256 Z"
        fill="#00e5ff" opacity="0.08"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="#00e5ff" opacity="0.9"/>
  <circle cx="256" cy="256" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Signal blips -->
  <circle cx="310" cy="185" r="6" fill="url(#blipGlow)"/>
  <circle cx="310" cy="185" r="3" fill="#00e5ff" opacity="0.9"/>

  <circle cx="195" cy="310" r="5" fill="url(#blipGlow)"/>
  <circle cx="195" cy="310" r="2.5" fill="#00e5ff" opacity="0.7"/>

  <circle cx="340" cy="300" r="4" fill="url(#blipGlow)"/>
  <circle cx="340" cy="300" r="2" fill="#00e5ff" opacity="0.6"/>

  <circle cx="180" cy="195" r="3.5" fill="url(#blipGlow)"/>
  <circle cx="180" cy="195" r="1.8" fill="#00e5ff" opacity="0.5"/>
</svg>
