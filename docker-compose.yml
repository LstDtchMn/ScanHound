services:
  scanhound:
    build: .
    image: scanhound:latest
    container_name: scanhound
    restart: unless-stopped
    # A2: the image already creates+switches to this non-root user (Dockerfile),
    # but the named volume below (scanhound_db) is Docker-managed and typically
    # gets created root:root on first `up` — pin the uid/gid here too so compose
    # and the image agree, and see the one-time chown note on that volume.
    user: "1000:1000"
    # No host port is published. The app is reached only through Nginx Proxy
    # Manager over the shared `proxy` network (see networks: below), so it is
    # never exposed on the host/LAN — NPM + Cloudflare front it.
    volumes:
      # Persists config (~/.config/scanhound) + data/DB (~/.local/share/scanhound)
      # under HOME=/data in one mount.
      - ./data:/data
      # Library/download folders for auto-rename. JDownloader (on the Windows
      # host) downloads to F:\Downloads; renamed 1080p stays there, 4K goes to
      # G:\Downloads. The container sees them as /library/movies + /movies-4k;
      # JD's Windows saveTo paths are translated to these (Settings → Renaming).
      - "F:/Downloads:/library/movies"
      - "G:/Downloads:/library/movies-4k"
      # crawler.db lives on a Docker-managed named volume (native VM ext4), NOT
      # the ./data bind mount: SQLite WAL's shared-memory index cannot be
      # mmap'd correctly across the Docker-for-Windows bind-mount proxy, which
      # was intermittently corrupting the DB. On first boot the app copy-migrates
      # the legacy ./data DB into this volume (see backend/config.py). The DV
      # host-detector handoff files (dv_host.json/.db) stay on ./data since they
      # must be host-visible.
      #
      # ONE-TIME (A2, existing deployments only): this named volume was likely
      # created root:root by earlier root-user runs, so the now-non-root
      # container (uid 1000) may fail to write /dbvol until it's chowned once:
      #   docker compose run --rm --user root scanhound chown -R 1000:1000 /dbvol
      # A fresh volume created after this change doesn't need it.
      - scanhound_db:/dbvol
    environment:
      - TZ=America/New_York
      - SCANHOUND_DB_DIR=/dbvol
    labels:
      # scanhound is a locally-built image (no registry) — tell Whats-Up-Docker
      # not to try checking Docker Hub for it (was logging 401 UNAUTHORIZED).
      - "wud.watch=false"
    extra_hosts:
      # Lets the container reach Plex running on the Docker host:
      # set plex_url = http://host.docker.internal:32400 in Settings.
      - "host.docker.internal:host-gateway"
    shm_size: "1gb"   # Chromium needs a large /dev/shm
    networks:
      # Join the existing shared reverse-proxy network. NPM (also on `proxy`)
      # forwards to this container as http://scanhound:9721.
      #
      # A4 (documented, not changed): every other container on `proxy` can
      # reach scanhound:9721 directly, bypassing NPM/Cloudflare Access — an
      # east-west blast-radius risk if any of those containers is ever
      # compromised. Not isolating it here: `proxy` is how NPM (a separate
      # compose project) reaches this container at all, so moving scanhound
      # off it (or onto a second dedicated network) requires coordinating a
      # matching change in NPM's own compose file/network config first, or
      # NPM loses the ability to forward to it. Deferred as an infra change
      # outside this branch's scope; A1 (fail-closed auth) is the actual
      # mitigation for what an east-west caller could do to this app today.
      - proxy

volumes:
  # Native Docker volume for crawler.db — off the corrupting Windows bind mount.
  scanhound_db:

networks:
  proxy:
    external: true
