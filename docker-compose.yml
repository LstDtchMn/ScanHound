services:
  scanhound:
    build: .
    image: scanhound:latest
    container_name: scanhound
    restart: unless-stopped
    # A2 (non-root) REVERTED for this Docker-Desktop-on-Windows deployment:
    # the app's core job is reading/writing HOST-created files across the
    # Windows bind mounts (JDownloader writes media to F:/G:, the DV
    # host-detector writes /data/dv_host.db for the container to import).
    # On Docker Desktop/Windows those host-written files are not reliably
    # readable by an arbitrary container uid (verified: uid 1000 got EACCES
    # reading config.json despite 0777), so running as non-root breaks config
    # load + DV import. Runs as root (root-in-VM, not Windows-admin). The
    # other Wave A hardenings (fail-closed auth, path confinement, CORS, dep
    # pins) stand. Revisit if this ever moves to a native Linux host.
    # No host port is published. The app is reached only through Nginx Proxy
    # Manager over the shared `proxy` network (see networks: below), so it is
    # never exposed on the host/LAN — NPM + Cloudflare front it.
    volumes:
      # Persists config (~/.config/scanhound) + data/DB (~/.local/share/scanhound)
      # under HOME=/data in one mount.
      - ./data:/data
      # Library/download folders for auto-rename. JDownloader (on the Windows
      # host) downloads to F:\Downloads; renamed 1080p stays there, 4K goes to
      # G:\Downloads. The container sees them as /library/movies +
      # /library/movies-4k; JD's Windows saveTo paths are translated to these
      # (Settings → Renaming).
      - "F:/Downloads:/library/movies"
      - "G:/Downloads:/library/movies-4k"
      # TV moved off F:\TV Shows to the "TV Shows Blackbeard" NAS share
      # (\\TURTLELANDSRV2\k, V: on the host) on 2026-07-18 — F: was a staging
      # area Plex never scanned, and its show folders had already been
      # migrated to this share by hand. The WHOLE share root is mounted, not
      # a subfolder, so V:\Downloads (JD's TV download folder) and
      # V:\Extractions (JD's extraction folder) are reachable as
      # /library/tv/Downloads and /library/tv/Extractions with no extra
      # mounts or mapping entries — and download, extract and rename all
      # happen on ONE volume, so applying a TV rename stays a metadata move
      # instead of a copy across the network.
      #
      # Read-WRITE, unlike the plex-source mounts below: this is a rename
      # DESTINATION, not just a probe target. Mounted via the same drvfs
      # workaround as the other NAS shares (see scripts/mount-nas-shares.ps1
      # and the comment on the /mnt/nas block).
      - "/mnt/nas/nas-tv-blackbeard:/library/tv"
      # The retired F:\TV Shows staging area, kept read-only so anything left
      # behind there is still visible to the probe/scan paths. Safe to drop
      # once it's confirmed empty.
      - "F:/TV Shows:/library/tv-legacy:ro"
      # Read-only mounts of the ACTUAL organized Plex library (as opposed to
      # the JD download/output folders above) so the technical-metadata probe
      # (probe_specs()/dovi_tool -- resolution/audio-profile/HDR10+/DV FEL-MEL)
      # can reach files that predate or live outside ScanHound's own
      # rename/apply pipeline. Verified 2026-07-12: without these, the
      # container could see only ~1.4% of plex_cache's movie file_paths.
      # Each drive is mounted directly by letter -- Plex's own file_paths use
      # NTFS junction aliases (C:\1080p Drives\<name>, C:\4K Drives\<name>)
      # for these SAME volumes, but Docker Desktop's drvfs bridge does not
      # follow those junctions (they resolve to a WSL2-internal symlink target
      # invisible to the container), so the underlying drive letter is the
      # only path that actually works. G:\Movies 1 is a second, distinct
      # folder on the already-mounted G: drive (separate from G:\Downloads).
      # Read-only: ScanHound only ever needs to READ these to probe them.
      - "A:/:/library/plex-source/a-4k-gambino:ro"
      - "B:/:/library/plex-source/b-1080p-eastwood-gengis-khan:ro"
      - "E:/:/library/plex-source/e-4k-hdr-columbo:ro"
      - "H:/:/library/plex-source/h-1080p-zepplin:ro"
      - "I:/:/library/plex-source/i-4k-hdr-arnold:ro"
      - "J:/:/library/plex-source/j-4k-jefferson-truman-bu:ro"
      - "K:/:/library/plex-source/k-1080p-kennedy-van-buren:ro"
      - "L:/:/library/plex-source/l-1080p-bismark:ro"
      - "M:/:/library/plex-source/m-1080p-nixon-maclom:ro"
      # F: is already mounted above for JD's own Downloads/TV-Shows staging,
      # but F:\1080p Tony Montana's actual movie folder ("Movies 1 1080p")
      # sits outside those two narrow subfolders -- a separate, broader
      # root-of-drive mount is needed to reach it. Confirmed safe: Docker
      # allows overlapping bind mounts at different container paths.
      - "F:/:/library/plex-source/f-1080p-tony-montana:ro"
      - "Q:/:/library/plex-source/q-4k-quantum:ro"
      - "R:/:/library/plex-source/r-4k-rickover:ro"
      - "U:/:/library/plex-source/u-4k-ulysses-yuri-gagarin-bu:ro"
      - "W:/:/library/plex-source/w-1080p-walter-white:ro"
      - "G:/Movies 1:/library/plex-source/g-movies-1:ro"
      # NAS shares (\\TURTLELANDSRV2\...). Docker Desktop cannot bind-mount a
      # raw UNC path directly (confirmed 2026-07-12: rejected in both compose
      # short-form and long-form syntax, "...is not a valid Windows path" --
      # a real validator bug/limitation, not a syntax issue -- and even an
      # EXISTING working net-use drive-letter mapping fails too, since
      # Docker's backend runs in a different session context than net-use
      # mappings live in). Workaround: each share is mounted directly inside
      # the docker-desktop WSL2 distro itself via `mount -t drvfs`, which
      # uses the same transparent Windows auth Explorer already has (no
      # credentials needed) and produces a plain Linux path Docker CAN bind
      # from, since it never goes through the broken Windows-path validator.
      # NOT PERSISTENT ACROSS A DOCKER DESKTOP / HOST RESTART on its own --
      # see scripts/host-detector/mount-nas-shares.ps1 and the matching
      # Scheduled Task that re-establishes these on startup/logon.
      - "/mnt/nas/nas-1080p-john-paul-jones:/library/plex-source/nas-1080p-john-paul-jones:ro"
      - "/mnt/nas/nas-1080p-lincoln:/library/plex-source/nas-1080p-lincoln:ro"
      - "/mnt/nas/nas-1080p-faraday:/library/plex-source/nas-1080p-faraday:ro"
      - "/mnt/nas/nas-1080p-icarus:/library/plex-source/nas-1080p-icarus:ro"
      - "/mnt/nas/nas-1080p-nathan-hale:/library/plex-source/nas-1080p-nathan-hale:ro"
      - "/mnt/nas/nas-1080p-picasso-aka-newton:/library/plex-source/nas-1080p-picasso-aka-newton:ro"
      - "/mnt/nas/nas-4k-hdr-geronimo:/library/plex-source/nas-4k-hdr-geronimo:ro"
      - "/mnt/nas/nas-4k-magellan:/library/plex-source/nas-4k-magellan:ro"
      # crawler.db lives on a Docker-managed named volume (native VM ext4), NOT
      # the ./data bind mount: SQLite WAL's shared-memory index cannot be
      # mmap'd correctly across the Docker-for-Windows bind-mount proxy, which
      # was intermittently corrupting the DB. On first boot the app copy-migrates
      # the legacy ./data DB into this volume (see backend/config.py). The DV
      # host-detector handoff files (dv_host.json/.db) stay on ./data since they
      # must be host-visible.
      #
      # ONE-TIME (A2, existing deployments only): this named volume was likely
      # created root:root by earlier root-user runs, so the now-non-root
      # container (uid 1000) may fail to write /dbvol until it's chowned once:
      #   docker compose run --rm --user root scanhound chown -R 1000:1000 /dbvol
      # A fresh volume created after this change doesn't need it.
      - scanhound_db:/dbvol
    environment:
      - TZ=America/New_York
      - SCANHOUND_DB_DIR=/dbvol
    labels:
      # scanhound is a locally-built image (no registry) — tell Whats-Up-Docker
      # not to try checking Docker Hub for it (was logging 401 UNAUTHORIZED).
      - "wud.watch=false"
    extra_hosts:
      # Lets the container reach Plex running on the Docker host:
      # set plex_url = http://host.docker.internal:32400 in Settings.
      - "host.docker.internal:host-gateway"
    shm_size: "1gb"   # Chromium needs a large /dev/shm
    networks:
      # Join the existing shared reverse-proxy network. NPM (also on `proxy`)
      # forwards to this container as http://scanhound:9721.
      #
      # A4 (documented, not changed): every other container on `proxy` can
      # reach scanhound:9721 directly, bypassing NPM/Cloudflare Access — an
      # east-west blast-radius risk if any of those containers is ever
      # compromised. Not isolating it here: `proxy` is how NPM (a separate
      # compose project) reaches this container at all, so moving scanhound
      # off it (or onto a second dedicated network) requires coordinating a
      # matching change in NPM's own compose file/network config first, or
      # NPM loses the ability to forward to it. Deferred as an infra change
      # outside this branch's scope; A1 (fail-closed auth) is the actual
      # mitigation for what an east-west caller could do to this app today.
      - proxy

volumes:
  # Native Docker volume for crawler.db — off the corrupting Windows bind mount.
  scanhound_db:

networks:
  proxy:
    external: true
